<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>株式会社 瀬戸内みらい創産</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: #f5f3ef;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .logo {
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      letter-spacing: 0.15em;
      color: #2c5f4a;
      font-weight: 500;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #2c5f4a;
      margin: 0 auto 2.5rem;
    }

    .message {
      font-size: clamp(0.85rem, 2vw, 1rem);
      line-height: 2;
      color: #555;
      letter-spacing: 0.05em;
    }

    .contact {
      margin-top: 3rem;
      font-size: 0.85rem;
      color: #888;
      letter-spacing: 0.05em;
    }

    .contact a {
      color: #2c5f4a;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="logo">瀬戸内みらい創産</p>
    <div class="divider"></div>
    <p class="message">
      ただいまウェブサイトを準備中です。<br>
      もうしばらくお待ちください。
    </p>
  </div>
</body>
</html>
